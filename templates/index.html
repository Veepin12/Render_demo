<!DOCTYPE html>
<html>
<head>
    <title>Placement Predictor Model</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input {
            margin: 10px;
            padding: 8px;
            width: 80%;
        }
        button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
        h3 {
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Placement Prediction Model</h2>

    <form action="/predict" method="post">
        <!-- Change number of inputs as per your model -->
        <input type="text" name="CGPA" placeholder="CGPA" required><br>
        <input type="text" name="IQ" placeholder="IQ" required><br>
        <input type="text" name="10 Mark" placeholder="10 Mark on scale of 10" required><br>
        <input type="text" name="12 Mark" placeholder="12 Mark on Sacle of 10" required><br>

        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>
</div>

</body>
</html>
